name: MonacOut — Nettoyage & Police

on:
  schedule:
    - cron: '0 4 * * *'    # 6h00 Monaco (UTC+2 en été)
    - cron: '0 16 * * *'   # 18h00 Monaco (UTC+2 en été)
  workflow_dispatch:         # lancement manuel depuis GitHub

jobs:
  police:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Configurer Git
        run: |
          git config user.name "MonacOut Bot"
          git config user.email "noreply@github.com"

      - name: Nettoyage des événements passés
        run: node cleanup-events.mjs

      - name: Auto-correction des dates vs PrinciPocket
        run: node cross-check-dates.mjs
        continue-on-error: true   # réseau : ne bloque pas si PrinciPocket est down

      - name: 🚓 LE POLICIER — autofix + contrôle (dates, géo, liens, noms, traduction)
        id: police
        run: node police-events.mjs
        continue-on-error: true   # on capture le verdict, on pousse les corrections, puis on alerte

      - name: 🎬 Rafraîchir la carte cinéma (date du jour)
        run: node scripts/refresh-cinema.mjs

      - name: Build & push des corrections automatiques
        run: |
          if ! git diff --quiet src/data/events.js; then
            npm run build
            git add src/data/events.js
            git commit -m "chore: police — corrections automatiques ($(date +%Y-%m-%d))"
            git push
          fi

      - name: Vérification réseau des liens (santé des billetteries)
        id: verify
        run: node verify-events.mjs
        continue-on-error: true

      - name: Alerte email si le policier ou la vérif ont signalé un problème
        if: steps.police.outcome == 'failure' || steps.verify.outcome == 'failure'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node send-alert-email.mjs

      - name: Statut final (échec visible si le policier a vu rouge)
        if: steps.police.outcome == 'failure'
        run: |
          echo "::error::Le policier a détecté des fautes critiques non corrigeables automatiquement — rapport envoyé par email."
          exit 1
