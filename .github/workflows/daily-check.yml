name: MonacOut — Nettoyage & Vérification

on:
  schedule:
    - cron: '0 4 * * *'    # 6h00 Monaco (UTC+2 en été)
    - cron: '0 16 * * *'   # 18h00 Monaco (UTC+2 en été)
  workflow_dispatch:         # lancement manuel depuis GitHub

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Configurer Git
        run: |
          git config user.name "MonacOut Bot"
          git config user.email "noreply@github.com"

      - name: Nettoyage événements passés
        run: node cleanup-events.mjs

      - name: Vérification croisée des dates (PrinciPocket)
        run: node cross-check-dates.mjs
        continue-on-error: true

      - name: Auto-correction des erreurs détectables
        run: node autofix-events.mjs

      - name: Build & push nettoyage (toujours, sans attendre la vérification)
        run: |
          if ! git diff --quiet src/data/events.js; then
            npm run build
            git add src/data/events.js
            git commit -m "chore: nettoyage automatique ($(date +%Y-%m-%d))"
            git push
          fi

      - name: Vérification géographie — événements hors Monaco (bloquant)
        run: |
          VALID="Monte-Carlo|Monaco-Ville|Monaco|Fontvieille|La Condamine|Larvotto|Moneghetti|Jardin Exotique|Saint-Roman|La Rousse"
          INVALID=$(grep -oP 'quarter:"\K[^"]+' src/data/events.js | grep -vP "^($VALID)$" || true)
          if [ -n "$INVALID" ]; then
            echo "::error::Quartiers hors Monaco détectés — App Store rejet immédiat !"
            echo "$INVALID"
            exit 1
          fi
          echo "✓ Tous les quartiers sont dans la Principauté."

      - name: Vérification liens agrégateurs interdits (bloquant)
        run: |
          FORBIDDEN="visitmonaco\.com|yourmonaco\.mc|principocket\.com|monte-carlo\.mc/|culture\.mc"
          FOUND=$(grep -oP 'link:"\K[^"]+' src/data/events.js | grep -P "$FORBIDDEN" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Liens agrégateurs interdits détectés — doit pointer vers le lieu officiel !"
            echo "$FOUND"
            exit 1
          fi
          echo "✓ Aucun lien agrégateur interdit."

      - name: Vérification complète (qualité — non bloquante, alerte email)
        id: verify
        run: node verify-events.mjs
        continue-on-error: true

      - name: Alerte email si problèmes détectés
        if: steps.verify.outcome == 'failure'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node send-alert-email.mjs

      - name: Statut final
        if: steps.verify.outcome == 'failure'
        run: |
          echo "::warning::verify-events a détecté des problèmes — rapport envoyé par email."
          exit 1
